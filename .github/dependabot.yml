version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]

  # Keep Go modules up to date
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      go-deps:
        patterns: ["*"]

  # Track the dicode-relay image tag used by the e2e test suite. The
  # `FROM` line in tests/e2e/relay/testdata/Dockerfile.relay is the
  # single source of truth — tests build it on the fly via
  # testcontainers-go's `FromDockerfile`, so a dependabot bump here is
  # picked up by the next test run with no code change.
  - package-ecosystem: docker
    directory: /tests/e2e/relay/testdata
    schedule:
      interval: weekly
      day: monday

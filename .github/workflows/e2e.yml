name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege GITHUB_TOKEN. The job only needs read access to check out
# the source; artifact upload uses its own implicit grant (actions: write) via
# actions/upload-artifact and does not require repo-level write scopes.
permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TEST_WEBHOOK_SECRET: test-webhook-secret-12345

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unauthenticated + webui e2e tests
        run: npx playwright test --project=unauthenticated --project=webui

      - name: Run authenticated e2e tests
        run: npx playwright test --project=authenticated
        env:
          DICODE_AUTH_MODE: authenticated

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dicode
    main: ./cmd/dicode/
    binary: dicode
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: dicoded
    main: ./cmd/dicoded/
    binary: dicoded
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: dicode
    builds: [dicode, dicoded]
    name_template: "dicode-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "dicode-{{ .Version }}-checksums.txt"

release:
  # Upload to the GitHub release that release-please already created.
  # GORELEASER_CURRENT_TAG is set by the workflow to the tag release-please created.
  use_existing_draft: true

changelog:
  disable: true  # release-please manages the changelog

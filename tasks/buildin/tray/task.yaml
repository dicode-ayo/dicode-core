apiVersion: dicode/v1
kind: Task
name: "System Tray"
description: >
  System tray icon daemon for dicode. Replaces the CGO pkg/tray/ implementation
  in dicode-core, removing the CGO build dependency from dicoded entirely.
  Uses Option A from issue #59: deno.land/x/systray bundles a pre-compiled
  native helper that communicates over stdin/stdout — no CGO, no GTK.
  See: https://github.com/dicode-ayo/dicode-core/issues/59
runtime: deno

permissions:
  env:
    - DICODE_PORT
  run:
    - "*"
  fs:
    - path: ~/.cache
      permission: rw

params:
  tray_version:
    description: Systray portable binary release tag
    default: "v0.2.0"

trigger:
  daemon: true
  restart: always

notify:
  on_success: false
  on_failure: false

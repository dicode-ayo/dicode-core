<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dicode</title>
  <script>
    // Inline theme init — runs before any CSS loads so there's no flash.
    (function () {
      try {
        var stored = localStorage.getItem("dicode-theme");
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.colorScheme = theme;
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <link rel="stylesheet" href="app/theme.css">
  <style>
    /* ── WebUI layout — uses tokens from theme.css ── */
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: var(--leading-normal);
      transition: background-color var(--duration) var(--ease), color var(--duration) var(--ease);
    }
    header {
      background: var(--bg-alt);
      color: var(--heading);
      padding: var(--space-sm) var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      border-bottom: 1px solid var(--border);
    }
    header a { color: var(--sky); text-decoration: none; font-weight: var(--font-semibold); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: var(--space-md);
      font-size: var(--text-base);
      transition: color var(--duration-fast) var(--ease);
    }
    nav a:hover { color: var(--sky); }
    main { padding: var(--space-lg); max-width: 1100px; margin: 0 auto; }
    h1 { font-size: var(--text-xl); margin-bottom: var(--space-md); color: var(--heading); font-weight: var(--font-bold); }
    h2 { font-size: var(--text-lg); margin-bottom: var(--space-sm); margin-top: var(--space-md); color: var(--heading); font-weight: var(--font-bold); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    th, td {
      padding: var(--space-sm) var(--space-md);
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: var(--text-base);
    }
    th { background: var(--bg-alt); font-weight: var(--font-semibold); color: var(--heading); }
    td { color: var(--text); }
    tr:last-child td { border-bottom: none; }

    a { color: var(--blue); }

    /* Badges — status indicators */
    .badge {
      display: inline-block;
      padding: 0.2em 0.6em;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
    }
    .badge-success  { background: rgba(22, 163, 74, .15);  color: var(--green);  border: 1px solid rgba(22, 163, 74, .3); }
    .badge-failure  { background: rgba(220, 38, 38, .15);  color: var(--red);    border: 1px solid rgba(220, 38, 38, .3); }
    .badge-running  { background: rgba(202, 138, 4, .15);  color: var(--yellow); border: 1px solid rgba(202, 138, 4, .3); }
    .badge-cancelled{ background: var(--card-bg);          color: var(--muted);  border: 1px solid var(--border); }
    .badge-manual   { background: var(--card-bg);          color: var(--muted);  border: 1px solid var(--border); }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      transition: background var(--duration-fast) var(--ease), transform var(--duration-fast) var(--ease);
    }
    .btn:hover { background: var(--blue2); transform: translateY(-1px); }
    .btn.secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--blue-tint); border-color: var(--blue); color: var(--blue); }
    .btn-sm { padding: var(--space-xs) var(--space-sm); font-size: var(--text-xs); }

    /* Focus ring */
    :focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 2px; }
    .btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

    /* Code blocks — use theme-aware code tokens */
    pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: var(--space-md);
      border: 1px solid var(--code-border);
      border-radius: var(--radius-sm);
      overflow-x: auto;
      font-size: var(--text-sm);
      font-family: var(--font-mono);
      line-height: var(--leading-normal);
      white-space: pre-wrap;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-md) var(--space-lg);
      margin-bottom: var(--space-md);
    }
    .meta { font-size: var(--text-sm); color: var(--muted); }

    /* Form inputs */
    .input {
      padding: var(--space-sm);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card-bg);
      color: var(--text);
      font-family: inherit;
    }
    .input:focus { outline: none; border-color: var(--blue); }

    .cfg-form input, .cfg-form select {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-xs) var(--space-sm);
      font-size: var(--text-base);
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
    }
    .cfg-form input:focus, .cfg-form select:focus { outline: none; border-color: var(--blue); }
    .cfg-form label {
      font-size: var(--text-xs);
      color: var(--muted);
      display: block;
      margin-bottom: var(--space-xs);
    }
    .cfg-form .field { margin-bottom: var(--space-sm); }
    .cfg-form .hint { font-size: var(--text-xs); color: var(--muted); margin-top: var(--space-xs); }
  </style>
</head>
<body>
<header>
  <a href=".">&#9889; dicode</a>
  <nav>
    <a href=".">Tasks</a>
    <a href="sources">Sources</a>
    <a href="config">Config</a>
    <a href="secrets">Secrets</a>
    <a href="security">Security</a>
  </nav>
  <dc-notif-panel></dc-notif-panel>
</header>
<main id="app"></main>
<dc-log-bar></dc-log-bar>

<!-- Monaco CDN loader (used by dc-task-detail and dc-config) -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script type="module" src="app/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dicode</title>
  <script>
    // Inline theme init — runs before any CSS loads so there's no flash.
    // Mirrors lib/theme.js's getCurrentTheme() logic: stored > system > dark default.
    (function () {
      try {
        var stored = localStorage.getItem('dicode-theme');
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)
              ? 'light'
              : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="app/global.css">
</head>
<body>
<header>
  <a href=".">&#9889; dicode</a>
  <nav>
    <a href=".">Tasks</a>
    <a href="sources">Sources</a>
    <a href="config">Config</a>
    <a href="secrets">Secrets</a>
    <a href="security">Security</a>
    <a href="metrics">Metrics</a>
  </nav>
  <div class="header-right">
    <dc-theme-toggle></dc-theme-toggle>
    <dc-notif-panel></dc-notif-panel>
  </div>
</header>
<main id="app"></main>
<dc-log-bar></dc-log-bar>

<script type="module" src="app/app.js"></script>
</body>
</html>

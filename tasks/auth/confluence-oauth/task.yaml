apiVersion: dicode/v1
kind: Task
name: Confluence / Atlassian OAuth
description: |
  Atlassian OAuth 2.0 (3LO) — PKCE only, no client secret required.
  A single token covers all Atlassian Cloud products: Confluence, Jira, Trello, etc.
  Add product-specific scopes to access each service. Tokens expire in 1 hour; rotated refresh tokens keep silent re-auth working indefinitely.

  ## Setup

  1. [developer.atlassian.com/console/myapps](https://developer.atlassian.com/console/myapps/) → Create → **OAuth 2.0 integration**
  2. **Permissions** → add the scopes your task needs (Confluence, Jira, …)
  3. **Authorization** → callback URL: `http://localhost:8080/hooks/confluence-oauth`
  4. **Settings** → copy the Client ID
  5. `dicode secret set CONFLUENCE_CLIENT_ID <client-id>`

  ## After authorisation

  Call `https://api.atlassian.com/oauth/token/accessible-resources` with the token to get cloud IDs for your Confluence / Jira sites.

runtime: deno
trigger:
  webhook: /hooks/confluence-oauth
permissions:
  env:
    - CONFLUENCE_CLIENT_ID  # optional — falls back to built-in
    - DICODE_BASE_URL        # optional — defaults to http://localhost:8080
    - name: CONFLUENCE_ACCESS_TOKEN
      secret: CONFLUENCE_ACCESS_TOKEN
      optional: true
    - name: CONFLUENCE_REFRESH_TOKEN
      secret: CONFLUENCE_REFRESH_TOKEN
      optional: true
  net:
    - auth.atlassian.com
    - api.atlassian.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
    tasks:
      - buildin/notifications
params:
  scope:
    type: string
    default: "read:me read:confluence-content.all offline_access"
    description: Space-separated Atlassian scopes. Include offline_access for a refresh token.
timeout: 30s

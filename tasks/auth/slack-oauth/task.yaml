apiVersion: dicode/v1
kind: Task
name: Slack OAuth
description: |
  Slack OAuth 2.0 — PKCE only, no client secret required (GA March 2026).
  Works out of the box with the built-in dicode app registration.
  Slack user tokens do **not expire** — once stored, no refresh is needed.

  ## Zero setup (built-in app)

  Just click **Run now**. The built-in client ID is used automatically.
  Redirect URI: `http://localhost:8080/hooks/slack-oauth`

  ## Using your own Slack App

  1. [api.slack.com/apps](https://api.slack.com/apps) → Create New App → From scratch
  2. **Settings** → Enable PKCE *(one-way operation)*
  3. **OAuth & Permissions** → Redirect URLs → `http://localhost:8080/hooks/slack-oauth`
  4. **OAuth & Permissions** → User Token Scopes → add scopes
  5. `dicode secret set SLACK_CLIENT_ID <client-id>`

runtime: deno
trigger:
  webhook: /hooks/slack-oauth
permissions:
  env:
    - SLACK_CLIENT_ID    # optional — falls back to built-in
    - DICODE_BASE_URL    # optional — defaults to http://localhost:8080
    - name: SLACK_USER_TOKEN
      secret: SLACK_USER_TOKEN
      optional: true
  net:
    - slack.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
    tasks:
      - buildin/notifications
params:
  - name: scope
    type: string
    default: "channels:read"
    description: Space-separated Slack user token scopes
timeout: 30s

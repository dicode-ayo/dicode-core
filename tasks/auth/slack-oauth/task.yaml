apiVersion: dicode/v1
kind: Task
name: Slack OAuth
description: >
  Dual-mode Slack OAuth2 task (Authorization Code + client secret).
  Run manually from the UI to get the authorization URL, open it in a browser.
  Slack redirects to the webhook, which exchanges the code and stores
  SLACK_BOT_TOKEN (and optionally SLACK_USER_TOKEN) in the encrypted secret store.

  Note: Slack does not support PKCE, so a client secret is required.

  ── Slack App setup ───────────────────────────────────────────────────────────
  1. Go to https://api.slack.com/apps → Create New App → From scratch.
  2. OAuth & Permissions → Redirect URLs → Add: http://localhost:8080/hooks/slack-oauth
  3. OAuth & Permissions → Bot Token Scopes → add the scopes you need.
  4. Basic Information → copy App Credentials (Client ID, Client Secret).
  5. Store credentials:
       dicode secret set SLACK_CLIENT_ID     <client-id>
       dicode secret set SLACK_CLIENT_SECRET <client-secret>
       dicode secret set DICODE_BASE_URL     http://localhost:8080

runtime: deno

trigger:
  webhook: /hooks/slack-oauth

permissions:
  env:
    - name: SLACK_CLIENT_ID
      secret: SLACK_CLIENT_ID
    - name: SLACK_CLIENT_SECRET
      secret: SLACK_CLIENT_SECRET
    - name: DICODE_BASE_URL
      secret: DICODE_BASE_URL
  net:
    - slack.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true

params:
  - name: scope
    type: string
    default: "channels:read,chat:write"
    description: Comma-separated bot token scopes to request

timeout: 30s

apiVersion: dicode/v1
kind: Task
name: Looker OAuth
description: |
  Looker OAuth 2.0 — PKCE, `client_secret` optional (depends on your Looker OAuth app config).
  Access tokens expire in **1 hour**; Looker does not issue refresh tokens, so re-auth is required each time.

  ## Setup

  1. **Looker Admin** → Users → OAuth Applications → Register a new app.
     Redirect URI: `http://localhost:8080/hooks/looker-oauth`
  2. Copy the Client ID (and Client Secret if required by your Looker config).
  3. Store your secrets:
     ```
     dicode secret set LOOKER_INSTANCE  company.cloud.looker.com
     dicode secret set LOOKER_CLIENT_ID <client-id>
     dicode secret set LOOKER_CLIENT_SECRET <client-secret>   # optional
     ```

  ## Instance URL

  Set `LOOKER_INSTANCE` to your Looker hostname without `https://`.
  For self-hosted Looker, include the port if needed: `company.looker.com:9999`

runtime: deno
trigger:
  webhook: /hooks/looker-oauth
permissions:
  env:
    - DICODE_BASE_URL  # optional — defaults to http://localhost:8080
    - name: LOOKER_INSTANCE
      secret: LOOKER_INSTANCE
      optional: true
    - name: LOOKER_CLIENT_ID
      secret: LOOKER_CLIENT_ID
    - name: LOOKER_CLIENT_SECRET
      secret: LOOKER_CLIENT_SECRET
      optional: true
    - name: LOOKER_ACCESS_TOKEN
      secret: LOOKER_ACCESS_TOKEN
      optional: true
  net:
    - "*"  # instance-specific hostname; set LOOKER_INSTANCE to restrict
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
    tasks:
      - buildin/notifications
params:
  - name: looker_instance
    type: string
    default: ""
    description: Looker hostname, e.g. company.cloud.looker.com (overrides LOOKER_INSTANCE secret)
  - name: scope
    type: string
    default: ""
    description: Space-separated Looker scopes (leave empty if your app has a fixed scope)
timeout: 30s

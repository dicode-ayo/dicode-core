apiVersion: dicode/v1
kind: Task
name: GitLab OAuth
description: >
  GitLab OAuth2 — PKCE + client secret.

  ── Setup ─────────────────────────────────────────────────────────────────────
  1. https://gitlab.com/-/profile/applications → Add new application.
     Redirect URI: http://localhost:8080/hooks/gitlab-oauth
     Enable scopes as needed.
  2. Store credentials:
       dicode secret set GITLAB_CLIENT_ID     <application-id>
       dicode secret set GITLAB_CLIENT_SECRET <secret>
       dicode secret set DICODE_BASE_URL      http://localhost:8080

runtime: deno
trigger:
  webhook: /hooks/gitlab-oauth
permissions:
  env:
    - name: GITLAB_CLIENT_ID
      secret: GITLAB_CLIENT_ID
    - name: GITLAB_CLIENT_SECRET
      secret: GITLAB_CLIENT_SECRET
    - name: DICODE_BASE_URL
      secret: DICODE_BASE_URL
  net:
    - gitlab.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
params:
  scope:
    type: string
    default: "read_user read_api"
    description: Space-separated GitLab scopes
timeout: 30s

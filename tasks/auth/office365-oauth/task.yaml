apiVersion: dicode/v1
kind: Task
name: Office 365 OAuth
description: |
  Microsoft identity platform OAuth 2.0 — PKCE + client secret.
  Covers all **Microsoft Graph** APIs: Mail, Calendar, Teams, OneDrive, SharePoint, and more.
  Access tokens expire in ~1 hour; refresh tokens are valid for **90 days** (reset on each use).

  ## Azure App Registration

  1. [portal.azure.com](https://portal.azure.com) → **Azure Active Directory** → App registrations → **New registration**
     - Supported account types: *Accounts in any organizational directory and personal accounts*
     - Redirect URI: `http://localhost:8080/hooks/office365-oauth`
  2. **Certificates & secrets** → Client secrets → New client secret → copy the **Value**
  3. **API permissions** → Add permission → Microsoft Graph → Delegated → add your scopes
  4. Store credentials:
     ```
     dicode secret set OFFICE365_CLIENT_ID     <application-id>
     dicode secret set OFFICE365_CLIENT_SECRET <client-secret-value>
     ```

  ## Scopes

  Common Microsoft Graph scopes: `User.Read`, `Mail.Read`, `Mail.Send`, `Calendars.Read`,
  `Files.ReadWrite`, `Team.ReadBasic.All`. Always include `offline_access` for a refresh token.

runtime: deno
trigger:
  webhook: /hooks/office365-oauth
permissions:
  env:
    - name: OFFICE365_CLIENT_ID
      secret: OFFICE365_CLIENT_ID
    - name: OFFICE365_CLIENT_SECRET
      secret: OFFICE365_CLIENT_SECRET
    - DICODE_BASE_URL  # optional — defaults to http://localhost:8080
    - name: OFFICE365_ACCESS_TOKEN
      secret: OFFICE365_ACCESS_TOKEN
      optional: true
    - name: OFFICE365_REFRESH_TOKEN
      secret: OFFICE365_REFRESH_TOKEN
      optional: true
  net:
    - login.microsoftonline.com
    - graph.microsoft.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
    tasks:
      - buildin/notifications
params:
  - name: scope
    type: string
    default: "offline_access User.Read Mail.Read Calendars.Read"
    description: Space-separated Microsoft Graph scopes. Always include offline_access for a refresh token.
timeout: 30s

apiVersion: dicode/v1
kind: Task
name: Spotify OAuth
description: |
  Spotify OAuth 2.0 — PKCE only, no client secret required.
  Access tokens expire in **1 hour** and are refreshed automatically using the stored refresh token.

  ## Zero setup (built-in app)

  Just click **Run now**. The built-in client ID is used automatically.
  Redirect URI: `http://localhost:8080/hooks/spotify-oauth`

  ## Using your own Spotify App

  1. [developer.spotify.com/dashboard](https://developer.spotify.com/dashboard) → Create app
     - Redirect URI: `http://localhost:8080/hooks/spotify-oauth`
  2. `dicode secret set SPOTIFY_CLIENT_ID <client-id>`

runtime: deno
trigger:
  webhook: /hooks/spotify-oauth
permissions:
  env:
    - SPOTIFY_CLIENT_ID  # optional — falls back to built-in
    - DICODE_BASE_URL    # optional — defaults to http://localhost:8080
    - name: SPOTIFY_ACCESS_TOKEN
      secret: SPOTIFY_ACCESS_TOKEN
      optional: true
    - name: SPOTIFY_REFRESH_TOKEN
      secret: SPOTIFY_REFRESH_TOKEN
      optional: true
  net:
    - accounts.spotify.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
    tasks:
      - buildin/notifications
params:
  - name: scope
    type: string
    default: "user-read-private user-read-email"
    description: Space-separated Spotify scopes
timeout: 30s

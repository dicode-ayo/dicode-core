apiVersion: dicode/v1
kind: Task
name: Airtable OAuth
description: >
  Airtable OAuth2 — PKCE required alongside client secret.

  ── Setup ─────────────────────────────────────────────────────────────────────
  1. https://airtable.com/create/oauth → Register integration.
     Redirect URL: http://localhost:8080/hooks/airtable-oauth
     Enable PKCE.
  2. Store credentials:
       dicode secret set AIRTABLE_CLIENT_ID     <client-id>
       dicode secret set AIRTABLE_CLIENT_SECRET <client-secret>
       dicode secret set DICODE_BASE_URL        http://localhost:8080

runtime: deno
trigger:
  webhook: /hooks/airtable-oauth
permissions:
  env:
    - name: AIRTABLE_CLIENT_ID
      secret: AIRTABLE_CLIENT_ID
    - name: AIRTABLE_CLIENT_SECRET
      secret: AIRTABLE_CLIENT_SECRET
    - name: DICODE_BASE_URL
      secret: DICODE_BASE_URL
  net:
    - airtable.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
params:
  scope:
    type: string
    default: "data.records:read"
    description: Space-separated Airtable scopes
timeout: 30s

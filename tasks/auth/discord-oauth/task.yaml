apiVersion: dicode/v1
kind: Task
name: Discord OAuth
description: |
  Discord OAuth 2.0 — PKCE only, no client secret required.
  Access tokens expire in **~1 week** and are refreshed automatically using the stored refresh token.

  ## Zero setup (built-in app)

  Just click **Run now**. The built-in client ID is used automatically.
  Redirect URI: `http://localhost:8080/hooks/discord-oauth`

  ## Using your own Discord Application

  1. [discord.com/developers/applications](https://discord.com/developers/applications) → New Application
  2. **OAuth2** → Redirects → Add: `http://localhost:8080/hooks/discord-oauth`
  3. `dicode secret set DISCORD_CLIENT_ID <client-id>`

runtime: deno
trigger:
  webhook: /hooks/discord-oauth
permissions:
  env:
    - DISCORD_CLIENT_ID  # optional — falls back to built-in
    - DICODE_BASE_URL    # optional — defaults to http://localhost:8080
    - name: DISCORD_ACCESS_TOKEN
      secret: DISCORD_ACCESS_TOKEN
      optional: true
    - name: DISCORD_REFRESH_TOKEN
      secret: DISCORD_REFRESH_TOKEN
      optional: true
  net:
    - discord.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
    tasks:
      - buildin/notifications
params:
  scope:
    type: string
    default: "identify email"
    description: Space-separated Discord scopes
timeout: 30s

apiVersion: dicode/v1
kind: Task
name: Stripe Connect OAuth
description: |
  Stripe Connect OAuth — connects a Stripe account to your platform.
  No PKCE support; requires your platform's Stripe secret key.
  Stores `STRIPE_ACCESS_TOKEN`, `STRIPE_REFRESH_TOKEN`, and `STRIPE_ACCOUNT_ID`.

  > **Note:** `client_id` is your Connect platform's client ID (`ca_xxx`), not the app client ID.
  > `client_secret` is your platform's Stripe secret key (`sk_live_xxx` / `sk_test_xxx`).

  ## Stripe Connect setup

  1. [dashboard.stripe.com/settings/connect](https://dashboard.stripe.com/settings/connect) → **Enable Connect**
  2. **Connect settings** → OAuth → add redirect URI: `http://localhost:8080/hooks/stripe-oauth`
  3. From your Dashboard, copy:
     - Your platform's **client_id**: found in Connect settings (starts with `ca_`)
     - Your **secret key**: API keys page (starts with `sk_live_` or `sk_test_`)
  4. Store credentials:
     ```
     dicode secret set STRIPE_CLIENT_ID  ca_xxx
     dicode secret set STRIPE_SECRET_KEY sk_live_xxx
     ```

  ## Test mode

  Use `sk_test_xxx` as your secret key to test in Stripe test mode.

runtime: deno
trigger:
  webhook: /hooks/stripe-oauth
permissions:
  env:
    - name: STRIPE_CLIENT_ID
      secret: STRIPE_CLIENT_ID
    - name: STRIPE_SECRET_KEY
      secret: STRIPE_SECRET_KEY
    - DICODE_BASE_URL  # optional — defaults to http://localhost:8080
    - name: STRIPE_ACCESS_TOKEN
      secret: STRIPE_ACCESS_TOKEN
      optional: true
    - name: STRIPE_REFRESH_TOKEN
      secret: STRIPE_REFRESH_TOKEN
      optional: true
  net:
    - connect.stripe.com
  fs:
    - path: ../_oauth
      permission: r
  dicode:
    secrets_write: true
    tasks:
      - buildin/notifications
params:
  - name: scope
    type: string
    default: "read_write"
    description: "Stripe Connect scope: read_write or read_only"
timeout: 30s

data_dir: TEMP_DATA_DIR
database:
  path: TEMP_DATA_DIR/data.db
  type: sqlite
log_level: info
execution:
  max_concurrent_tasks: 2
defaults:
  run_inputs:
    # The e2e fixture taskset registers tasks under the "e2e-tests" namespace,
    # so the storage backend task ID is e2e-tests/local-storage rather than
    # the default buildin/local-storage.
    storage_task: e2e-tests/local-storage
server:
  port: 8765
  auth: false
  mcp: true
sources:
  - name: e2e-tests
    type: local
    path: TEMP_TASKSET_PATH
    watch: true

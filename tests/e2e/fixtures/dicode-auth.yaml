data_dir: TEMP_DATA_DIR
database:
  path: TEMP_DATA_DIR/data.db
  type: sqlite
log_level: info
execution:
  max_concurrent_tasks: 2
defaults:
  run_inputs:
    # The e2e fixture taskset registers tasks under the "e2e-tests" namespace.
    storage_task: e2e-tests/local-storage
server:
  port: 8765
  auth: true
  secret: test-passphrase-12345
  mcp: false
sources:
  - name: e2e-tests
    type: local
    path: TEMP_TASKSET_PATH
    watch: true

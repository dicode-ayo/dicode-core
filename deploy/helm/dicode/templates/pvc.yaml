{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dicode.dataClaimName" . }}
  labels:
    {{- include "dicode.labels" . | nindent 4 }}
  annotations:
    # Keep the PVC on `helm uninstall` so users don't lose SQLite, the
    # master key, or dicode.yaml. Removing it is a deliberate
    # `kubectl delete pvc` step (called out in NOTES.txt + README).
    helm.sh/resource-policy: keep
    {{- with .Values.persistence.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- with .Values.persistence.storageClass }}
  {{- if eq . "-" }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ . | quote }}
  {{- end }}
  {{- end }}
{{- end }}

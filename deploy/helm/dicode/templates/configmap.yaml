{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dicode.fullname" . }}-config
  labels:
    {{- include "dicode.labels" . | nindent 4 }}
data:
  # Mounted by the Deployment at /data/dicode.yaml via subPath.
  dicode.yaml: |
{{ .Values.config | indent 4 }}
{{- end }}

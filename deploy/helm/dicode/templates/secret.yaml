{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dicode.fullname" . }}
  labels:
    {{- include "dicode.labels" . | nindent 4 }}
type: Opaque
# `data:` (base64) is binary-safe for any value, including secrets that
# contain newlines or non-UTF-8 bytes. If anyone migrates this template
# to `stringData:` in the future, drop the b64enc — but be aware that
# stringData rejects non-UTF-8 input and will fail on binary keys.
data:
  {{- range $k, $v := .Values.secret.values }}
  {{ $k }}: {{ $v | toString | b64enc | quote }}
  {{- end }}
{{- end }}

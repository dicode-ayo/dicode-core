apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dicode.fullname" . }}
  labels:
    {{- include "dicode.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate, not RollingUpdate: the data PVC is RWO and cannot be
  # attached to two pods at once during a rolling rollout. Recreate
  # tears the old pod down before the new one starts.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "dicode.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dicode.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.config .Values.podAnnotations }}
      annotations:
        {{- if .Values.config }}
        # Roll the pod when dicode.yaml changes so the new config is
        # picked up without a manual restart.
        checksum/config: {{ .Values.config | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dicode.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: dicode
          image: {{ include "dicode.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $secretName := include "dicode.secretName" . -}}
          {{- if or $secretName .Values.envFrom }}
          envFrom:
            {{- if $secretName }}
            - secretRef:
                name: {{ $secretName }}
            {{- end }}
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            # /tmp must be writable because the container runs with
            # readOnlyRootFilesystem; some Go stdlib paths
            # (os.CreateTemp, etc.) need /tmp.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.config }}
            - name: config
              mountPath: /data/dicode.yaml
              subPath: dicode.yaml
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dicode.dataClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.config }}
        - name: config
          configMap:
            name: {{ include "dicode.fullname" . }}-config
            items:
              - key: dicode.yaml
                path: dicode.yaml
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

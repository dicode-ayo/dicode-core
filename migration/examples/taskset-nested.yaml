# taskset-nested.yaml — Team-owned nested task set
#
# Lives in github.com/team/backend-tasks, referenced from taskset-root.yaml
# under the `backend` entry.
#
# This file is owned by the backend team. They define their own defaults
# and task overrides. The parent (infra) may push additional defaults and
# patch specific entries via overrides.defaults / overrides.entries without
# touching this file.
#
# Full precedence for a task in this set (lowest → highest):
#   task.yaml base → dicode-config.yaml → spec.defaults (this file)
#   → parent overrides.defaults → parent overrides.entries.<key>
#   → entry-level overrides (this file)
#
# Resolved IDs when loaded via infra:
#   infra/backend/api-deploy
#   infra/backend/worker
#   infra/backend/legacy-job
#   infra/backend/integrations/...

apiVersion: dicode/v1
kind: TaskSet

metadata:
  name: backend

spec:

  # ── Set-level defaults (backend team's own baseline) ─────────────────────
  # These apply to every entry in this set.
  # The parent (infra) may inject additional env/timeout via overrides.defaults,
  # which sits one level above these in the precedence stack.
  defaults:
    timeout: 90s
    env:
      - APP_ENV=production
      - LOG_LEVEL=warn

  entries:

    # Team default: 4am. Parent (infra) overrides to 3am via overrides.entries.
    # Precedence: task.yaml → set defaults (90s, APP_ENV, LOG_LEVEL)
    #             → parent defaults (REGION=eu-west-1)
    #             → parent entry patch (cron=0 3 * * *)   ← wins for cron
    #             → this entry overrides (cron=0 4 * * *, image_tag)
    #
    # Resolved ID: infra/backend/api-deploy
    api-deploy:
      ref:
        url: https://github.com/team/backend-tasks
        path: tasks/api-deploy/task.yaml
        dev_ref:
          path: /home/user/backend-tasks/tasks/api-deploy/task.yaml
      overrides:
        enabled: true
        trigger:
          cron: "0 4 * * *"           # team default; parent patches to 3am
        params:
          - name: image_tag
            default: latest

    # Resolved ID: infra/backend/worker
    worker:
      ref:
        url: https://github.com/team/backend-tasks
        path: tasks/worker/task.yaml
      overrides:
        enabled: true
        trigger:
          daemon: true                 # always-on; set defaults timeout does not apply to daemons

    # Enabled here; parent (infra) sets enabled: false → disabled in infra environment.
    # Leaf wins: this file sets true, parent entry patch sets false → false.
    #
    # Resolved ID: infra/backend/legacy-job
    legacy-job:
      ref:
        url: https://github.com/team/legacy-repo
        path: tasks/legacy-job/task.yaml
        poll_interval: 300s
        auth:
          type: token
          token_env: LEGACY_GITHUB_TOKEN
      overrides:
        enabled: true
        trigger:
          cron: "0 1 * * 0"           # weekly, Sunday 1am

    # Further nesting — arbitrary depth.
    # overrides.defaults here would push defaults into integrations tasks.
    #
    # Resolved IDs: infra/backend/integrations/stripe-sync, etc.
    integrations:
      ref:
        url: https://github.com/team/integrations-tasks
        path: taskset.yaml
      overrides:
        entries:
          stripe-sync:
            trigger:
              cron: "*/15 * * * *"    # every 15 min in this environment

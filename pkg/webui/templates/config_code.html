{{define "content"}}
<style>
  /* Override main max-width so the editor fills the viewport */
  main { max-width: none !important; padding: 0.75rem 1.25rem; }
  #cfg-editor-wrap {
    display: flex; flex-direction: column;
    height: calc(100vh - 7rem); /* header + logbar + some padding */
    background: #1e1e2e; border-radius: 6px; overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,.2);
  }
  #cfg-toolbar {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.45rem 0.75rem;
    background: #16213e; border-bottom: 1px solid #2a2a4a;
  }
  #cfg-toolbar span { font-size: 0.82rem; color: #cdd6f4; font-weight: 600; }
  #cfg-save-status { font-size: 0.8rem; margin-left: 0.25rem; }
  #cfg-monaco { flex: 1; min-height: 0; }
</style>

<div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.6rem">
  <h1 style="margin:0">Edit config</h1>
  <a href="/config" class="btn btn-sm" style="background:#6c757d">← Visual view</a>
</div>

<div id="cfg-editor-wrap">
  <div id="cfg-toolbar">
    <span>dicode.yaml</span>
    <span id="cfg-save-status"></span>
    <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center">
      <span style="font-size:0.72rem;color:#555">Ctrl+S to save</span>
      <button class="btn btn-sm" onclick="cfgSave()">💾 Save</button>
    </div>
  </div>
  <div id="cfg-monaco"></div>
</div>

<script>
(function() {
  var MONACO_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs';

  function initMonaco(content) {
    var s = document.createElement('script');
    s.src = MONACO_CDN + '/loader.js';
    s.onload = function() {
      require.config({ paths: { vs: MONACO_CDN } });
      require(['vs/editor/editor.main'], function() {
        var editor = monaco.editor.create(document.getElementById('cfg-monaco'), {
          value: content,
          language: 'yaml',
          theme: 'vs-dark',
          fontSize: 13,
          lineNumbers: 'on',
          wordWrap: 'off',
          minimap: { enabled: true },
          scrollBeyondLastLine: false,
          automaticLayout: true,
        });

        // Ctrl+S / Cmd+S → save
        editor.addCommand(
          monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
          function() { cfgSave(editor); }
        );

        // Track dirty state
        var saved = content;
        editor.getModel().onDidChangeContent(function() {
          var dirty = editor.getValue() !== saved;
          var st = document.getElementById('cfg-save-status');
          st.textContent = dirty ? '● unsaved' : '';
          st.style.color = '#f9e2af';
        });

        window._cfgEditor = editor;
        window._cfgSaved  = content;
      });
    };
    document.head.appendChild(s);
  }

  // Load raw config on page load.
  fetch('/api/config/raw')
    .then(function(r) { return r.json(); })
    .then(function(d) { initMonaco(d.content || ''); })
    .catch(function(e) { initMonaco('# error loading config: ' + e.message); });

  window.cfgSave = function(editor) {
    editor = editor || window._cfgEditor;
    if (!editor) return;
    var content = editor.getValue();
    fetch('/api/config/raw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'content=' + encodeURIComponent(content),
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var st = document.getElementById('cfg-save-status');
        if (d.status === 'ok') {
          window._cfgSaved = content;
          st.textContent = '✓ saved';
          st.style.color = '#a6e3a1';
          setTimeout(function() { st.textContent = ''; }, 3000);
        } else {
          st.textContent = '✗ ' + (d.error || 'save failed');
          st.style.color = '#f38ba8';
        }
      })
      .catch(function(e) {
        var st = document.getElementById('cfg-save-status');
        st.textContent = '✗ ' + e.message;
        st.style.color = '#f38ba8';
      });
  };
})();
</script>
{{end}}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — dicode</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #212529; }
    header { background: #1a1a2e; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    header a { color: #a0c4ff; text-decoration: none; font-weight: 600; }
    nav a { color: #ccc; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
    main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.5rem; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th, td { padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f1f3f5; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    a { color: #0d6efd; }
    .badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
    .badge-success { background: #d1e7dd; color: #0f5132; }
    .badge-failure { background: #f8d7da; color: #842029; }
    .badge-running   { background: #fff3cd; color: #664d03; }
    .badge-cancelled { background: #e2e3e5; color: #383d41; }
    .badge-manual    { background: #e2e3e5; color: #383d41; }
    .btn { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 5px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; background: #0d6efd; color: #fff; text-decoration: none; }
    .btn:hover { background: #0b5ed7; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.78rem; }
    /* Keyboard navigation — visible focus ring on all interactive elements */
    :focus-visible { outline: 2px solid #0d6efd; outline-offset: 2px; border-radius: 2px; }
    .btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
    pre { background: #1e1e2e; color: #cdd6f4; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.82rem; line-height: 1.5; white-space: pre-wrap; }
    .card { background: #fff; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .meta { font-size: 0.82rem; color: #6c757d; }
  </style>
</head>
<body>
<header>
  <a href="/">⚡ dicode</a>
  <nav>
    <a href="/">Tasks</a>
    <a href="/config">Config</a>
    <a href="/secrets">Secrets</a>
  </nav>
  <div id="notif-bell" onclick="toggleInbox()" style="margin-left:auto;cursor:pointer;position:relative;padding:0.25rem 0.5rem;color:#ccc;font-size:1.1rem" title="Notifications">
    🔔 <span id="notif-badge" style="display:none;position:absolute;top:0;right:0;background:#f38ba8;color:#fff;border-radius:9px;font-size:0.65rem;padding:1px 5px;font-weight:700">0</span>
  </div>
</header>
<main>
{{block "content" .}}{{end}}
</main>
<div id="logbar" style="position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:#cdd6f4;font-family:monospace;font-size:0.78rem;z-index:100;border-top:1px solid #333;">
  <div onclick="toggleLogs()" style="padding:0.3rem 1rem;cursor:pointer;background:#16213e;display:flex;align-items:center;gap:0.5rem;user-select:none;">
    <span id="logarrow">▶</span> App Logs
    <span id="logstatus" style="margin-left:0.5rem;font-size:0.7rem;color:#888"></span>
    <span id="logcount" style="margin-left:auto;font-size:0.7rem;color:#666"></span>
  </div>
  <pre id="logconsole" style="display:none;height:200px;overflow-y:auto;padding:0.5rem 1rem;margin:0;white-space:pre-wrap;word-break:break-all"></pre>
</div>
<div style="height:2rem"></div><!-- spacer so content isn't hidden behind logbar -->
<script>
(function() {
  let open = false;
  let count = 0;
  const el = document.getElementById('logconsole');
  const arrow = document.getElementById('logarrow');
  const countEl = document.getElementById('logcount');
  const statusEl = document.getElementById('logstatus');

  window.toggleLogs = function() {
    open = !open;
    el.style.display = open ? 'block' : 'none';
    arrow.textContent = open ? '▼' : '▶';
    if (open) el.scrollTop = el.scrollHeight;
  };

  const levelColor = { DEBUG:'#89b4fa', INFO:'#a6e3a1', WARN:'#f9e2af', ERROR:'#f38ba8' };

  function append(line) {
    let text = line;
    let color = '';
    try {
      const j = JSON.parse(line);
      const lvl = (j.level || 'info').toUpperCase();
      const ts  = j.ts ? new Date(j.ts * 1000).toLocaleTimeString() : '';
      const extra = Object.entries(j)
        .filter(([k]) => !['level','ts','msg','caller','stacktrace'].includes(k))
        .map(([k,v]) => k+'='+JSON.stringify(v)).join(' ');
      text = ts + ' ' + lvl.padEnd(5) + ' ' + (j.msg || '') + (extra ? ' ' + extra : '');
      color = levelColor[lvl] || '';
    } catch(_) {}
    count++;
    countEl.textContent = count + ' lines';
    const span = document.createElement('span');
    if (color) span.style.color = color;
    span.textContent = text + '\n';
    el.appendChild(span);
    if (open) el.scrollTop = el.scrollHeight;
  }

  const es = new EventSource('/logs/stream');
  es.onopen = function() { statusEl.textContent = '● connected'; statusEl.style.color = '#a6e3a1'; };
  es.onmessage = function(e) { append(e.data); };
  es.onerror = function() { statusEl.textContent = '● disconnected'; statusEl.style.color = '#f38ba8'; };
})();
</script>
<script>
// Cancel any HTMX polling request while the tab is hidden.
// The polling timer still fires but the network call is aborted immediately.
// When the tab becomes visible the next tick fires normally — no extra code needed.
document.addEventListener('htmx:beforeRequest', function(evt) {
  if (document.hidden) {
    evt.preventDefault();
  }
});
</script>

<!-- Notification inbox panel -->
<div id="notif-panel" style="display:none;position:fixed;top:48px;right:0;width:340px;max-height:480px;overflow-y:auto;background:#fff;border:1px solid #dee2e6;border-radius:6px 0 0 6px;box-shadow:-2px 2px 8px rgba(0,0,0,.15);z-index:200">
  <div style="display:flex;align-items:center;padding:0.6rem 1rem;border-bottom:1px solid #eee;background:#f8f9fa">
    <strong style="font-size:0.9rem">Notifications</strong>
    <button onclick="clearInbox()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#6c757d;font-size:0.8rem">Clear</button>
  </div>
  <div id="notif-list" style="font-size:0.85rem"></div>
</div>

<!-- Notification permission banner -->
<div id="notif-banner" style="display:none;position:fixed;bottom:2.5rem;left:0;right:0;background:#1a1a2e;color:#cdd6f4;padding:0.6rem 1.5rem;align-items:center;gap:1rem;z-index:150;border-top:1px solid #333">
  <span style="flex:1">⚡ dicode can send browser notifications when tasks complete.</span>
  <button onclick="requestNotifPermission()" class="btn btn-sm">Allow</button>
  <button onclick="dismissNotifBanner()" style="background:none;border:none;cursor:pointer;color:#888;font-size:1.1rem">✕</button>
</div>

<script>
(function() {
  var STORAGE_KEY = 'dicode_notifs';
  var BANNER_KEY  = 'dicode_notif_banner_dismissed';
  var MAX_NOTIFS  = 50;
  var unread = 0;
  var inboxOpen = false;

  /* ── Inbox state ── */
  function loadNotifs() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_) { return []; }
  }
  function saveNotifs(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list.slice(-MAX_NOTIFS)));
  }

  function addNotif(evt) {
    var list = loadNotifs();
    list.push({ ts: Date.now(), runID: evt.runID, taskName: evt.taskName, taskID: evt.taskID, status: evt.status, durationMs: evt.durationMs });
    saveNotifs(list);
    renderInbox();
    if (!inboxOpen) {
      unread++;
      updateBadge();
    }
  }

  function renderInbox() {
    var list = loadNotifs().slice().reverse();
    var el = document.getElementById('notif-list');
    if (!el) return;
    if (list.length === 0) {
      el.innerHTML = '<div style="padding:1rem;color:#888;text-align:center">No notifications yet.</div>';
      return;
    }
    el.innerHTML = list.map(function(n) {
      var ago = Math.round((Date.now() - n.ts) / 60000);
      var agoStr = ago < 1 ? 'just now' : ago < 60 ? ago + 'm ago' : Math.round(ago/60) + 'h ago';
      var ok = n.status === 'success';
      var icon = ok ? '✓' : '✗';
      var color = ok ? '#0f5132' : '#842029';
      var bg = ok ? '#d1e7dd' : '#f8d7da';
      return '<div style="display:flex;align-items:center;gap:0.5rem;padding:0.6rem 1rem;border-bottom:1px solid #f0f0f0">'
        + '<span style="background:' + bg + ';color:' + color + ';border-radius:4px;padding:0.1em 0.5em;font-weight:600;font-size:0.78rem">' + icon + ' ' + n.status + '</span>'
        + '<div style="flex:1;min-width:0"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + n.taskName + '</div>'
        + '<div style="color:#888;font-size:0.75rem">' + agoStr + '</div></div>'
        + '<a href="/runs/' + n.runID + '" style="font-size:0.75rem;white-space:nowrap">View →</a>'
        + '</div>';
    }).join('');
  }

  function updateBadge() {
    var badge = document.getElementById('notif-badge');
    if (!badge) return;
    if (unread > 0) {
      badge.textContent = unread > 99 ? '99+' : unread;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  }

  window.toggleInbox = function() {
    inboxOpen = !inboxOpen;
    var panel = document.getElementById('notif-panel');
    if (panel) panel.style.display = inboxOpen ? 'block' : 'none';
    if (inboxOpen) {
      unread = 0;
      updateBadge();
      renderInbox();
    }
  };

  window.clearInbox = function() {
    saveNotifs([]);
    renderInbox();
  };

  /* ── Permission banner ── */
  function maybeShowBanner() {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'granted') return;
    if (localStorage.getItem(BANNER_KEY)) return;
    var banner = document.getElementById('notif-banner');
    if (banner) banner.style.display = 'flex';
  }

  window.requestNotifPermission = function() {
    Notification.requestPermission().then(function() {
      dismissNotifBanner();
      registerSW();
    });
  };

  window.dismissNotifBanner = function() {
    localStorage.setItem(BANNER_KEY, '1');
    var banner = document.getElementById('notif-banner');
    if (banner) banner.style.display = 'none';
  };

  /* ── Service Worker ── */
  var swReg = null;
  function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function(reg) {
      swReg = reg;
    }).catch(function(e) {
      console.warn('dicode SW registration failed:', e);
    });
  }

  /* ── SSE run:complete stream ── */
  function connectRunEvents() {
    var es = new EventSource('/api/events');
    es.addEventListener('run:complete', function(e) {
      try {
        var evt = JSON.parse(e.data);
        addNotif(evt);
        // Post to Service Worker for browser notification.
        if (swReg && swReg.active && Notification.permission === 'granted') {
          swReg.active.postMessage({ type: 'run:complete', ...evt });
        }
      } catch(_) {}
    });
    es.onerror = function() {
      setTimeout(connectRunEvents, 5000);
      es.close();
    };
  }

  /* ── Init ── */
  renderInbox();
  maybeShowBanner();
  registerSW();
  connectRunEvents();
})();
</script>
</body>
</html>

{{define "editor"}}
<div class="card" id="editor-panel" style="margin-top:1.5rem;padding:0.75rem">

  <!-- ── Toolbar ── -->
  <div id="editor-tabs" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap">
    <button id="tab-task-js" class="btn btn-sm" onclick="editorSwitchTab('task.js')">task.js</button>
    {{if .TestExists}}
    <button id="tab-task-test-js" class="btn btn-sm" style="background:#6c757d" onclick="editorSwitchTab('task.test.js')">task.test.js</button>
    {{end}}

    <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center">
      <span id="editor-status" style="font-size:0.8rem"></span>
      <button class="btn btn-sm" onclick="editorSave()">💾 Save</button>
      {{if not .TestExists}}
      <button class="btn btn-sm" style="background:#6c757d" onclick="editorCreateTest()">+ task.test.js</button>
      {{end}}
      <button id="ai-toggle-btn" class="btn btn-sm" style="background:#7c3aed" onclick="aiToggle()">🤖 AI</button>
      <button class="btn btn-sm" style="background:#6c757d"
        onclick="editorDestroy();document.getElementById('editor-panel').remove()">✕ Close</button>
    </div>
  </div>

  <!-- ── Main area: Monaco | AI panel ── -->
  <div style="display:flex;gap:0.75rem;align-items:stretch">

    <!-- Monaco editor -->
    <div id="monaco-container" style="flex:1;min-width:0;height:440px;border-radius:4px;overflow:hidden"></div>

    <!-- AI chat panel (hidden until toggled) -->
    <div id="ai-panel" style="display:none;width:360px;flex-shrink:0;flex-direction:column;
         background:#13131f;border-radius:6px;border:1px solid #2a2a4a;overflow:hidden">

      <!-- Header -->
      <div style="padding:0.5rem 0.75rem;background:#1a1a2e;border-bottom:1px solid #2a2a4a;
                  display:flex;align-items:center;gap:0.5rem">
        <span style="color:#a0c4ff;font-weight:600;font-size:0.85rem">🤖 AI Task Dev</span>
        <span id="ai-model-label" style="font-size:0.7rem;color:#555;margin-left:auto"></span>
      </div>

      <!-- Chat history -->
      <div id="ai-history" style="flex:1;overflow-y:auto;padding:0.75rem;font-size:0.8rem;
           font-family:system-ui,sans-serif;color:#cdd6f4;min-height:240px;max-height:300px;
           line-height:1.5"></div>

      <!-- Status bar -->
      <div id="ai-status" style="padding:0.2rem 0.75rem;font-size:0.7rem;color:#7c7ca8;
           border-top:1px solid #2a2a4a;min-height:1.4rem;font-family:monospace"></div>

      <!-- Input -->
      <div style="padding:0.5rem;border-top:1px solid #2a2a4a;display:flex;flex-direction:column;gap:0.4rem">
        <textarea id="ai-input"
          placeholder="Describe the task you want… (Ctrl+Enter to send)"
          style="width:100%;background:#0e0e1a;color:#cdd6f4;border:1px solid #2a2a4a;
                 border-radius:4px;padding:0.45rem 0.5rem;font-size:0.78rem;resize:none;
                 height:72px;font-family:system-ui,sans-serif;outline:none;box-sizing:border-box"
          onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter'){aiSend();event.preventDefault()}"
        ></textarea>
        <div style="display:flex;gap:0.4rem;align-items:center">
          <button class="btn btn-sm" onclick="aiSend()"
            style="background:#7c3aed;flex:1">Send</button>
          <button class="btn btn-sm" onclick="aiClear()"
            style="background:#333;font-size:0.7rem" title="Clear chat">✕ Clear</button>
        </div>
      </div>
    </div><!-- /ai-panel -->
  </div>

  <p class="meta" style="margin-top:0.4rem">Ctrl+S / ⌘+S to save &nbsp;·&nbsp; Ctrl+Enter in AI panel to send</p>
</div>

<script>
(function() {
  var TASK_ID = {{toJSON .ID}};
  var files   = { 'task.js': {{toJSON .TaskJS}} {{if .TestExists}}, 'task.test.js': {{toJSON .TestJS}}{{end}} };
  var curFile = 'task.js';
  var editor  = null;
  var models  = {};

  /* ── Monaco ── */
  function loadMonaco(cb) {
    if (window.monaco) { cb(); return; }
    var s = document.createElement('script');
    s.src = 'https://unpkg.com/monaco-editor@0.52.0/min/vs/loader.js';
    s.onload = function() {
      require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.52.0/min/vs' } });
      require(['vs/editor/editor.main'], cb);
    };
    document.head.appendChild(s);
  }

  function langFor(fname) {
    return fname === 'task.yaml' ? 'yaml' : 'javascript';
  }

  function initEditor() {
    Object.keys(files).forEach(function(f) {
      models[f] = monaco.editor.createModel(files[f], langFor(f));
    });
    editor = monaco.editor.create(document.getElementById('monaco-container'), {
      model:                models['task.js'],
      theme:                'vs-dark',
      automaticLayout:      true,
      minimap:              { enabled: false },
      fontSize:             13,
      lineHeight:           20,
      scrollBeyondLastLine: false,
      tabSize:              2,
      insertSpaces:         true,
      wordWrap:             'off',
      renderLineHighlight:  'gutter',
    });
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, editorSave);
  }

  /* ── Tab management ── */
  window.editorSwitchTab = function(file) {
    if (!editor) return;
    if (!models[file]) return;
    curFile = file;
    editor.setModel(models[file]);
    /* reset all tab button colours */
    var tabs = document.getElementById('editor-tabs');
    tabs.querySelectorAll('button[data-tab]').forEach(function(b) {
      b.style.background = '#6c757d';
    });
    var btn = document.getElementById('tab-' + file.replace(/\./g,'-'));
    if (btn) btn.style.background = '#0d6efd';
  };

  /* Mark tab buttons with data-tab so the selector above works */
  document.querySelectorAll('#editor-tabs button[id^="tab-"]').forEach(function(b) {
    b.setAttribute('data-tab', '1');
  });
  /* Ensure task.js tab starts active */
  var jsBtn = document.getElementById('tab-task-js');
  if (jsBtn) { jsBtn.setAttribute('data-tab','1'); jsBtn.style.background = '#0d6efd'; }

  /* Dynamically add a tab for a file if it doesn't exist yet */
  function ensureTab(fname) {
    var btnId = 'tab-' + fname.replace(/\./g,'-');
    if (document.getElementById(btnId)) return;
    var tabs = document.getElementById('editor-tabs');
    var actionsDiv = tabs.querySelector('div[style*="margin-left:auto"]');
    var btn = document.createElement('button');
    btn.id = btnId;
    btn.className = 'btn btn-sm';
    btn.style.background = '#6c757d';
    btn.textContent = fname;
    btn.setAttribute('data-tab','1');
    btn.onclick = function() { editorSwitchTab(fname); };
    tabs.insertBefore(btn, actionsDiv);
  }

  /* ── Save ── */
  window.editorSave = function() {
    if (!editor) return;
    var statusEl = document.getElementById('editor-status');
    statusEl.textContent = 'Saving…';
    statusEl.style.color = '#888';
    fetch('/api/tasks/' + TASK_ID + '/files/' + curFile, {
      method: 'POST',
      body:   new URLSearchParams({ content: editor.getValue() }),
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var ok = d.status === 'saved';
      statusEl.textContent = ok ? '✓ Saved' : ('✗ ' + (d.error || 'Error'));
      statusEl.style.color  = ok ? '#a6e3a1' : '#f38ba8';
      setTimeout(function() { statusEl.textContent = ''; }, 3000);
    })
    .catch(function() {
      statusEl.textContent = '✗ Network error';
      statusEl.style.color  = '#f38ba8';
    });
  };

  /* ── Create test file ── */
  window.editorCreateTest = function() {
    fetch('/api/tasks/' + TASK_ID + '/files/task.test.js', {
      method: 'POST',
      body:   new URLSearchParams({ content: '// Tests for ' + TASK_ID + '\n' }),
    }).then(function() {
      htmx.ajax('GET', '/ui/tasks/' + TASK_ID + '/editor',
        { target: '#editor-panel', swap: 'outerHTML' });
    });
  };

  /* ── Cleanup ── */
  window.editorDestroy = function() {
    if (editor) { editor.dispose(); editor = null; }
    Object.values(models).forEach(function(m) { m.dispose(); });
    models = {};
    if (aiReader) { try { aiReader.cancel(); } catch(_) {} aiReader = null; }
  };

  /* ════════════════════════════════════════
     AI CHAT
     ════════════════════════════════════════ */

  var aiOpen     = false;
  var aiStreaming = false;
  var aiReader   = null;

  window.aiToggle = function() {
    aiOpen = !aiOpen;
    var panel = document.getElementById('ai-panel');
    panel.style.display = aiOpen ? 'flex' : 'none';
    document.getElementById('ai-toggle-btn').style.background = aiOpen ? '#5b21b6' : '#7c3aed';
    if (aiOpen) {
      document.getElementById('ai-input').focus();
      document.getElementById('ai-model-label').textContent = '{{.ID}}';
    }
    if (editor) editor.layout();
  };

  window.aiSend = function() {
    if (aiStreaming) return;
    var inputEl = document.getElementById('ai-input');
    var prompt  = inputEl.value.trim();
    if (!prompt) return;
    inputEl.value = '';
    aiAppend('user', prompt);
    aiStartStream(prompt);
  };

  window.aiClear = function() {
    document.getElementById('ai-history').innerHTML = '';
  };

  /* Append a message bubble to the chat history */
  function aiAppend(role, text) {
    var history = document.getElementById('ai-history');
    var div     = document.createElement('div');
    div.style.cssText = 'margin-bottom:0.6rem;padding:0.4rem 0.6rem;border-radius:4px;';
    if (role === 'user') {
      div.style.background = '#1e2140';
      div.innerHTML = '<span style="color:#89b4fa;font-weight:600;font-size:0.72rem">YOU</span><br>'
        + esc(text).replace(/\n/g,'<br>');
    } else if (role === 'ai') {
      div.style.background = '#1a2a1a';
      div.id = 'ai-bubble-' + Date.now();
      div.innerHTML = '<span style="color:#a6e3a1;font-weight:600;font-size:0.72rem">AI</span><br>'
        + '<span class="ai-text"></span>';
    } else if (role === 'file') {
      div.style.background = '#1e1a30';
      div.innerHTML = '<span style="color:#f9e2af;font-size:0.72rem">📄 WROTE</span> '
        + '<code style="color:#cba6f7;font-size:0.78rem">' + esc(text) + '</code>';
    } else if (role === 'error') {
      div.style.background = '#2a1a1a';
      div.innerHTML = '<span style="color:#f38ba8;font-size:0.72rem">ERROR</span><br>' + esc(text);
    }
    history.appendChild(div);
    history.scrollTop = history.scrollHeight;
    return div;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('ai-status').textContent = msg;
  }

  /* Stream the AI response using fetch + ReadableStream (POST SSE) */
  function aiStartStream(prompt) {
    aiStreaming = true;
    setStatus('⏳ Thinking…');

    var aiBubble      = null;  // current AI message bubble
    var aiTextSpan    = null;  // <span class="ai-text"> inside bubble
    var aiText        = '';    // accumulated text for current bubble

    fetch('/api/tasks/' + TASK_ID + '/ai/stream', {
      method: 'POST',
      body:   new URLSearchParams({ prompt: prompt }),
    })
    .then(function(resp) {
      if (!resp.ok) {
        return resp.text().then(function(t) { throw new Error(t.trim()); });
      }
      var reader  = resp.body.getReader();
      aiReader    = reader;
      var decoder = new TextDecoder();
      var buf     = '';

      function pump() {
        return reader.read().then(function(chunk) {
          if (chunk.done) {
            aiStreaming = false;
            aiReader    = null;
            setStatus('');
            return;
          }
          buf += decoder.decode(chunk.value, { stream: true });

          /* Parse SSE lines */
          var lines = buf.split('\n');
          buf = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (!line.startsWith('data: ')) continue;
            var raw = line.slice(6);
            var ev;
            try { ev = JSON.parse(raw); } catch(_) { continue; }

            switch (ev.type) {
            case 'text':
              /* Lazy-create AI bubble on first text chunk */
              if (!aiBubble) {
                aiBubble   = aiAppend('ai', '');
                aiTextSpan = aiBubble.querySelector('.ai-text');
                aiText     = '';
              }
              aiText += ev.content;
              /* Render simple markdown: code fences → <code>, bold, line breaks */
              aiTextSpan.innerHTML = renderMarkdown(aiText);
              document.getElementById('ai-history').scrollTop = 999999;
              setStatus('✍ Writing…');
              break;

            case 'file':
              /* Update / create Monaco model for the file */
              if (models[ev.filename]) {
                models[ev.filename].setValue(ev.content);
              } else {
                models[ev.filename] = monaco.editor.createModel(ev.content, langFor(ev.filename));
              }
              ensureTab(ev.filename);
              editorSwitchTab(ev.filename);
              aiAppend('file', ev.filename);
              setStatus('💾 Saved ' + ev.filename);
              /* Reset text accumulation — next text chunk is a new bubble */
              aiBubble   = null;
              aiTextSpan = null;
              aiText     = '';
              break;

            case 'done':
              aiStreaming = false;
              aiReader    = null;
              setStatus('✓ Done');
              setTimeout(function() { setStatus(''); }, 4000);
              aiBubble   = null;
              break;

            case 'error':
              aiStreaming = false;
              aiReader    = null;
              aiAppend('error', ev.message);
              setStatus('');
              aiBubble   = null;
              break;
            }
          }

          return pump();
        });
      }
      return pump();
    })
    .catch(function(err) {
      aiStreaming = false;
      aiReader    = null;
      aiAppend('error', err.message || String(err));
      setStatus('');
    });
  }

  /* Minimal markdown renderer: code blocks, inline code, bold, line-breaks */
  function renderMarkdown(s) {
    /* fenced code blocks */
    s = esc(s).replace(/```[\w]*\n?([\s\S]*?)```/g, function(_, code) {
      return '<pre style="background:#0d0d1a;padding:0.4rem;border-radius:3px;font-size:0.75rem;'
           + 'overflow-x:auto;white-space:pre;margin:0.25rem 0">' + code + '</pre>';
    });
    /* inline code */
    s = s.replace(/`([^`]+)`/g, '<code style="background:#1e1e3a;padding:0.1em 0.3em;border-radius:2px;color:#cba6f7">$1</code>');
    /* bold */
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    /* line breaks */
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  loadMonaco(initEditor);
})();
</script>
{{end}}

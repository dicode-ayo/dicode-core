<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dicode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #212529; }
    header { background: #1a1a2e; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    header a { color: #a0c4ff; text-decoration: none; font-weight: 600; }
    nav a { color: #ccc; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
    main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.5rem; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th, td { padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f1f3f5; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    a { color: #0d6efd; }
    .badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
    .badge-success  { background: #d1e7dd; color: #0f5132; }
    .badge-failure  { background: #f8d7da; color: #842029; }
    .badge-running  { background: #fff3cd; color: #664d03; }
    .badge-cancelled{ background: #e2e3e5; color: #383d41; }
    .badge-manual   { background: #e2e3e5; color: #383d41; }
    .btn { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 5px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; background: #0d6efd; color: #fff; text-decoration: none; }
    .btn:hover { background: #0b5ed7; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.78rem; }
    .btn.secondary { background: #6c757d; }
    .btn.secondary:hover { background: #5a6268; }
    :focus-visible { outline: 2px solid #0d6efd; outline-offset: 2px; border-radius: 2px; }
    .btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
    pre { background: #1e1e2e; color: #cdd6f4; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.82rem; line-height: 1.5; white-space: pre-wrap; }
    .card { background: #fff; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .meta { font-size: 0.82rem; color: #6c757d; }
    .input { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; }
  </style>
</head>
<body>
<header>
  <a href="/" id="brand" onclick="navigate('/');return false">&#9889; dicode</a>
  <nav>
    <a href="/" onclick="navigate('/');return false">Tasks</a>
    <a href="/config" onclick="navigate('/config');return false">Config</a>
    <a href="/secrets" onclick="navigate('/secrets');return false">Secrets</a>
  </nav>
  <div id="notif-bell" style="margin-left:auto;cursor:pointer;position:relative;padding:0.25rem 0.5rem;color:#ccc;font-size:1.1rem" title="Notifications">
    &#128276; <span id="notif-badge" style="display:none;position:absolute;top:0;right:0;background:#f38ba8;color:#fff;border-radius:9px;font-size:0.65rem;padding:1px 5px;font-weight:700">0</span>
  </div>
</header>
<main id="app"></main>

<!-- Log bar -->
<div id="logbar" style="position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:#cdd6f4;font-family:monospace;font-size:0.78rem;z-index:100;border-top:1px solid #333;">
  <div id="logbar-header" style="padding:0.3rem 1rem;cursor:pointer;background:#16213e;display:flex;align-items:center;gap:0.5rem;user-select:none;">
    <span id="logarrow">&#9654;</span> App Logs
    <span id="logstatus" style="margin-left:0.5rem;font-size:0.7rem;color:#888"></span>
    <span id="logcount" style="margin-left:auto;font-size:0.7rem;color:#666"></span>
  </div>
  <pre id="logconsole" style="display:none;height:200px;overflow-y:auto;padding:0.5rem 1rem;margin:0;white-space:pre-wrap;word-break:break-all"></pre>
</div>
<div style="height:2rem"></div>

<!-- Notification panel -->
<div id="notif-panel" style="display:none;position:fixed;top:48px;right:0;width:340px;max-height:480px;overflow-y:auto;background:#fff;border:1px solid #dee2e6;border-radius:6px 0 0 6px;box-shadow:-2px 2px 8px rgba(0,0,0,.15);z-index:200">
  <div style="display:flex;align-items:center;padding:0.6rem 1rem;border-bottom:1px solid #eee;background:#f8f9fa">
    <strong style="font-size:0.9rem">Notifications</strong>
    <button id="notif-clear" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#6c757d;font-size:0.8rem">Clear</button>
  </div>
  <div id="notif-list" style="font-size:0.85rem"></div>
</div>

<!-- Monaco CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script type="module" src="/app/app.js"></script>
</body>
</html>

apiVersion: dicode/v1
kind: Task
name: Gmail to Slack
description: Fetches today's Gmail messages and posts a digest to a Slack channel.
runtime: js

trigger:
  cron: "0 8 * * *"  # every day at 8 AM

permissions:
  env:
    - GMAIL_CLIENT_ID
    - GMAIL_CLIENT_SECRET
    - GMAIL_REFRESH_TOKEN
    - SLACK_BOT_TOKEN
  
params:
  - name: slack_channel
    type: string
    default: "#general"
    description: Slack channel to post the daily digest
  - name: max_emails
    type: number
    default: "20"
    description: Maximum number of emails to include (capped at 50)

timeout: 60s
